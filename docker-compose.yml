services:
  nats:
    image: nats:2.10.11-alpine
    command: -js
    ports:
      - "4222:4222"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  gateway:
    build: ./go
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  logic-engine:
    build: ./python
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
