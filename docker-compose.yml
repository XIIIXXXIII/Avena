version: '3.8'

services:
  nats:
    image: nats:2.10.11-alpine
    command: -js
    ports:
      - "4222:4222"
    networks:
      - avena_network
    restart: unless-stopped

  gateway-watcher:
    build: ./rust
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      NATS_URL: nats://nats:4222
    networks:
      - avena_network
    depends_on:
      - nats
    restart: unless-stopped

  command-router:
    build: ./go
    environment:
      NATS_URL: nats://nats:4222
    networks:
      - avena_network
    depends_on:
      - nats
    restart: unless-stopped

  logic-engine:
    build: ./python
    environment:
      NATS_URL: nats://nats:4222
    networks:
      - avena_network
    depends_on:
      - nats
    restart: unless-stopped

  string-processor:
    build: ./cpp
    environment:
      NATS_URL: nats://nats:4222
    networks:
      - avena_network
    depends_on:
      - nats
    restart: unless-stopped

networks:
  avena_network:
    driver: bridge
